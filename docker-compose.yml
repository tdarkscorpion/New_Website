version: '3.8'

services:
  web:
    build: .
    ports:
      - "8082:80"
    volumes:
      - ./Decoded for referance:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=talisman_pwd
    depends_on:
      - db

  db:
    image: mysql:5.7
    platform: linux/amd64
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=talisman_pwd
    volumes:
      - db_data:/var/lib/mysql
      - ./database structure for old website .sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    ports:
      - "8085:8080"

  web-encoded:
    build: .
    ports:
      - "8083:80"
    volumes:
      - ./github_ready/Encrypted_Distribution:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=talisman_pwd
    depends_on:
      - db

volumes:
  db_data:
